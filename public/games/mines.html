<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StraPlay - Mines</title>
  <link rel="icon" href="/img/logo_straplay.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/games.css">
</head>
<body>

<div class="home-button" onclick="location.href='/'"><img src="/img/logo_straplay.png" alt="Home"></div>

<div class="logo-container"><img id="gameLogo" src="/img/mines2.png" alt="Mines" class="logo"></div>

<div class="mines-container">
  <div class="mines-grid"></div>
  <div class="mines-config">
    <label>Quantidade de Minas:
      <select id="minesCount">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </label>
  </div>
  <div class="container-botao" style="margin:0;">
    <button id="placeBet" class="btn-bet">GERAR SINAL</button>
  </div>
  <div id="sinal-msg" style="display:none; text-align:center; color:#00ff6a; margin-top:12px; font-weight:bold;"></div>
</div>

<div class="iframe-wrap">
  <iframe class="iframe" src="" id="iframe" title="VemnaBet" allow="payment *; clipboard-write" allowfullscreen></iframe>
</div>

<footer class="footer">Copyright © 2025 - <a href="/"><b>STRAPLAY</b></a></footer>

<script src="/js/game-core.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var grid    = document.querySelector('.mines-grid');
  var select  = document.getElementById('minesCount');
  var btn     = document.getElementById('placeBet');
  var msg     = document.getElementById('sinal-msg');
  var mines   = [];
  var count   = 3;
  var timer   = null;

  function build() {
    grid.innerHTML = '';
    for (var i = 0; i < 25; i++) {
      var cell = document.createElement('div');
      cell.className = 'mine-cell';
      cell.dataset.index = i;
      var c = document.createElement('div');
      c.className = 'circle';
      cell.appendChild(c);
      grid.appendChild(cell);
    }
  }
  function reset() {
    document.querySelectorAll('.mine-cell').forEach(function (c) { c.classList.remove('revealed-mine'); });
  }
  function reveal() {
    reset();
    mines.forEach(function (i) {
      var cell = document.querySelector('.mine-cell[data-index="' + i + '"]');
      if (cell) cell.classList.add('revealed-mine');
    });
  }
  function start() {
    count = parseInt(select.value);
    mines = [];
    while (mines.length < count) {
      var p = Math.floor(Math.random() * 25);
      if (mines.indexOf(p) === -1) mines.push(p);
    }
    reveal();
  }
  function showMsg() {
    msg.textContent = '✅ Realizar até 4 jogadas com o mesmo sinal!';
    msg.style.display = 'block';
  }
  function countdown(s) {
    btn.disabled = true;
    var r = s;
    btn.textContent = 'Aguarde (' + r + 's)';
    showMsg();
    timer = setInterval(function () {
      r--;
      btn.textContent = 'Aguarde (' + r + 's)';
      if (r <= 0) {
        clearInterval(timer);
        btn.textContent = 'GERAR SINAL';
        btn.disabled = false;
        msg.style.display = 'none';
        reset();
        mines = [];
      }
    }, 1000);
  }

  btn.addEventListener('click', function () {
    if (!btn.disabled) { start(); countdown(20); }
  });
  select.addEventListener('change', function () { count = parseInt(this.value); });

  build();
});
</script>
</body>
</html>
