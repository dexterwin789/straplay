}

html, body {

p{
    margin: 0;
}

/*Scroll Bar*/
::-webkit-scrollbar{
    width: 7px;
    background-color: #303030;
}

::-webkit-scrollbar-thumb{
    background-color: #CF5908;
}

/*Tigrinho*/
.box{
    position: relative;
    max-width: 300px;
    width: 100%;
    height: 500px;
    margin: 1em auto 2em auto;
}

.box > img{
    position: absolute;
    width: 100%;
    height: 100%;
    object-position: center;
}

.box-items{
    display: flex;
    width: 100%;
    height: 83%;
    flex-direction: column;
    justify-content: end;
    align-items: center;
    font-size: 13px;
    gap: 9px;
}

.box-item{
    display: flex;
    width: 79%;
    height: 48px;
    padding: 20px;
    border-radius: 10px;
    background: linear-gradient(to right, hsl(2, 40%, 30%), #8a1503, #8a1503, #8a1503, #8a1503);
    gap: 3px;
    align-items: center;
    border: 1px solid #bb3b28;
}

.box-item #validade, .box-item #turbo, .box-item #normal, .box-item #level {
    font-size: 16px;
    text-shadow: 0 0 20px #fff900, 1px 1px 20px #000000, 2px 2px 20px #fff900, -1px -1px 20px #fff900, -2px -2px 20px #fff900;
}

.box-item span{
    color: white;
    font-weight: bold;
}

.box-bottom{
    position: absolute;
    width: 78%; 
    left: 50%;
    transform: translateX(-50%);
    bottom: 1px;
}

.animated-text{
    position: relative;
    display: flex;
    width: 100%;
    height: 15px;
    overflow: hidden;
    white-space: nowrap;
    align-items: center;
    justify-content: center;
    margin-bottom: 7px;
}

.animated-text span{
    position: absolute;
    left: 100%;
    font-size: .5rem;
    color: white;
    animation: animatedText 20s linear infinite;
}

/*Botão*/
@keyframes animatedText {
    100% {
        left: -150%;
    }
}

@keyframes pulse {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.05);
  }
  100% {
    transform: scale(1);
  }
}

#btn {
  width: 100%;
  padding: 8px 0;
  color: white;
  background: linear-gradient(45deg, #34c620, #29f513);
  outline: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  animation: pulse 1.5s infinite;
  border: 1px solid #53ff7b;
  font-size: 15px;

}

#btn:active {
  animation: none;
  transform: scale(0.95);
}


#btn:disabled{
    background: transparent;
    color: #ffaf93;
    font-size: 14px;
    font-weight: normal;
    border: 0px;
}

/*Iframe afiliado*/
#iframe {
    display: block;
    margin:1em auto 3em auto;
    width: 1140px;
    max-width: 100%;
    height: 700px;
    border: 0;
    border-radius: 15px;
    
    background: #000;
}





/*Footer*/
.footer{
    color: #ffffff;
    background-color: #1e1e1e;
    text-align: center;
    align-items: center;
    font-size: 0.875em;
    font-weight: 400;
    padding: 10px;
    margin: 0;
    margin-top: 1em;;
}

.footer #link{
    color: #CF5908;
    font-weight: 700;
}

/* Estilos para o botão da imagem home */
.home-button {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 1000;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 50%; /* Arredondar o botão */
    padding: 4px;
    background-color: rgba(0, 0, 0, 0.5); /* Fundo semitransparente */
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

.home-button img {
    width: 40px;
    height: 40px;
    border-radius: 50%; /* Arredondar a imagem */
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
}

/* Efeito de hover no botão */
.home-button:hover {
    border-color: #f0c420;
    box-shadow: 0 0 15px rgba(240, 196, 32, 0.8);
}

/* Efeito de hover na imagem */
.home-button:hover img {
    filter: brightness(1.2);
    transform: scale(1.1);
}
</style>

<style id="mines-styles">

.mines-header{display:flex;justify-content:center;margin-bottom:10px;color:#fff;font-size:18px}
.mines-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:20px 0 10px 0}
.mine-cell{width:100%;aspect-ratio:1;background-color:rgba(0,0,0,.25);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:default;position:relative;border:2px solid transparent;transition:all .6s ease}
.mine-cell .circle{width:70%;height:70%;border-radius:50%;background-color:rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;font-size:1.5em;position:relative;z-index:1}
.mine-cell.revealed-mine .circle{color:#fff}

.mines-config{margin:15px 0 10px 0;text-align:center}
.mines-config label{color:#fff;font-size:16px;display:inline-flex;align-items:center;gap:10px}
#minesCount{background:rgba(0,0,0,.3);border:2px solid #00cc66;border-radius:6px;color:#fff;padding:8px 12px;font-size:16px;outline:none;margin-left:5px}
.bet-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;margin-top:10px}
.btn-bet{background-color:#00cc66;color:#fff;border:none;padding:12px 30px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:18px;transition:all .25s;flex-grow:1;max-width:240px}
.btn-bet:hover:not(:disabled){background:#00994d;transform:scale(1.05)}
.btn-bet:disabled{opacity:.7;cursor:not-allowed}
@media(max-width:480px){.mines-container{max-width:92vw;padding:14px}.mines-grid{gap:6px}}

<script type="text/javascript">
	const lazyloadRunObserver = () => {
		const dataAttribute = 'data-e-bg-lazyload';
		const lazyloadBackgrounds = document.querySelectorAll( `[${ dataAttribute }]:not(.lazyloaded)` );
		const lazyloadBackgroundObserver = new IntersectionObserver( ( entries ) => {
		entries.forEach( ( entry ) => {
			if ( entry.isIntersecting ) {
				let lazyloadBackground = entry.target;
				const lazyloadSelector = lazyloadBackground.getAttribute( dataAttribute );
			if ( lazyloadSelector ) {
				lazyloadBackground = entry.target.querySelector( lazyloadSelector );
			}
			if( lazyloadBackground ) {
				lazyloadBackground.classList.add( 'lazyloaded' );
			}
				lazyloadBackgroundObserver.unobserve( entry.target );
			}
			});
			}, { rootMargin: '100px 0px 100px 0px' } );
				lazyloadBackgrounds.forEach( ( lazyloadBackground ) => {
				lazyloadBackgroundObserver.observe( lazyloadBackground );
			} );
			};
			const events = [
				'DOMContentLoaded',
				'elementor/lazyload/observe',
			];
			events.forEach( ( event ) => {
				document.addEventListener( event, lazyloadRunObserver );
			} );
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const minesGrid = document.querySelector('.mines-grid');
  const minesCountSelect = document.getElementById('minesCount');
  const placeBetButton = document.getElementById('placeBet');
  const sinalMsg = document.getElementById('sinal-msg');
  
  let minesLocations = [];
  let minesCount = 3;
  let countdownInterval = null;

  // Cria a grade 5x5
  function createGrid() {
    minesGrid.innerHTML = '';
    for (let i = 0; i < 25; i++) {
      const cell = document.createElement('div');
      cell.className = 'mine-cell';
      cell.dataset.index = i;
      const circle = document.createElement('div');
      circle.className = 'circle';
      cell.appendChild(circle);
      minesGrid.appendChild(cell);
    }
  }

  // Limpa todas as bombas do grid
  function resetGrid() {
    document.querySelectorAll('.mine-cell').forEach(cell => {
      cell.classList.remove('revealed-mine');
    });
  }

  // Revela as minas na grade
  function revealMines() {
    resetGrid();
    minesLocations.forEach(index => {
      const cell = document.querySelector(`.mine-cell[data-index="${index}"]`);
      cell.classList.add('revealed-mine');
    });
  }

  // Inicia o jogo
  function startGame() {
    minesCount = parseInt(minesCountSelect.value);
    minesLocations = [];
    while (minesLocations.length < minesCount) {
      const minePosition = Math.floor(Math.random() * 25);
      if (!minesLocations.includes(minePosition)) {
        minesLocations.push(minePosition);
      }
    }
    revealMines();
  }

  // Exibe a mensagem
  function showSinalMsg() {
    sinalMsg.textContent = "Realizar até 4 jogadas com o mesmo sinal!";
    sinalMsg.style.display = "block";
  }

  // Contagem regressiva no botão de aposta
  function startCountdown(seconds) {
    placeBetButton.disabled = true;
    let remaining = seconds;
    placeBetButton.textContent = `Aguarde (${remaining}s)`;
    showSinalMsg(); // Mostra a mensagem ao iniciar
    countdownInterval = setInterval(() => {
      remaining--;
      placeBetButton.textContent = `Aguarde (${remaining}s)`;
      if (remaining <= 0) {
        clearInterval(countdownInterval);
        placeBetButton.textContent = "GERAR SINAL";
        placeBetButton.disabled = false;
        sinalMsg.style.display = "none"; // Esconde a mensagem ao zerar
        resetGrid(); // Limpa as bombas
        minesLocations = [];
      }
    }, 1000);
  }

  // Evento do botão
  placeBetButton.addEventListener('click', function() {
    if (!placeBetButton.disabled) {
      startGame();
      startCountdown(20);
    }
  });

  // Atualiza quantidade de minas
  minesCountSelect.addEventListener('change', function() {
    minesCount = parseInt(this.value);
  });

  // Inicialização
  createGrid();
});

</script>

<script id="mines-logic">
(function(){
  var grid=document.querySelector('.mines-grid');
  var sel=document.getElementById('minesCount');
  var btn=document.getElementById('placeBet');
  var msg=document.getElementById('sinal-msg');
  if(!grid||!sel||!btn) return;
  var minesLocations=[];
  var minesCount=parseInt(sel.value,10)||3;
  function build(){
    grid.innerHTML='';
    for(var i=0;i<25;i++){
      var c=document.createElement('div');c.className='mine-cell';c.dataset.index=i;
      var ci=document.createElement('div');ci.className='circle';
      c.appendChild(ci);grid.appendChild(c);
    }
  }
  function reset(){
    document.querySelectorAll('.mine-cell').forEach(function(c){c.classList.remove('revealed-mine');});
    minesLocations=[];
  }
  function reveal(){
    minesLocations.forEach(function(idx){
      var c=document.querySelector('.mine-cell[data-index="'+idx+'"]');
      if(c) c.classList.add('revealed-mine');
    });
  }
  function startGame(){
    reset();
    minesCount=parseInt(sel.value,10)||3;
    var total=Math.min(Math.max(minesCount,1),24);
    while(minesLocations.length<total){
      var p=Math.floor(Math.random()*25);
      if(minesLocations.indexOf(p)===-1) minesLocations.push(p);
    }
    reveal();
  }
  function countdown(s){
    btn.disabled=true;btn.textContent='Aguarde ('+s+'s)';
    if(msg){msg.textContent='Realizar até 4 jogadas com o mesmo sinal!';msg.style.display='block';}
    var rem=s;var iv=setInterval(function(){
      rem--;
      if(rem<=0){clearInterval(iv);btn.disabled=false;btn.textContent='GERAR SINAL';if(msg)msg.style.display='none';reset();}
      else{btn.textContent='Aguarde ('+rem+'s)';}
    },1000);
  }
  build();
  btn.addEventListener('click',function(){if(!btn.disabled){startGame();countdown(20);}});
  sel.addEventListener('change',function(){minesCount=parseInt(this.value,10)||3;});
})();
</script>
