<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/notiflix/3.2.7/notiflix-3.2.7.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/notiflix/3.2.7/notiflix-aio-3.2.7.min.js"></script>
<script>
(function(){
  var nomes=['Jose','Joao','Antonio','Carlos','Paulo','Pedro','Lucas','Luiz','Marcos','Gabriel','Rafael','Daniel','Marcelo','Bruno','Eduardo','Felipe','Rodrigo','Mateus','Andre','Fernando','Fabio','Leonardo','Gustavo','Guilherme','Leandro','Tiago','Anderson','Ricardo','Jorge','Alexandre','Roberto','Diego','Vitor','Sergio','Matheus','Thiago','Adriano','Luciano','Julio','Renato','Alex','Vinicius','Rogerio','Samuel','Ronaldo','Mario','Flavio','Douglas','Igor','Davi','Maria','Ana','Juliana','Marcia','Fernanda','Patricia','Aline','Sandra','Camila','Amanda','Bruna','Jessica','Leticia','Julia','Luciana','Vanessa','Mariana','Gabriela','Vitoria','Larissa','Claudia','Beatriz','Rita','Luana','Sonia','Renata','Eliane'];
  var sobre=['A.','B.','C.','D.','F.','G.','L.','M.','N.','P.','R.','S.','V.'];
  var produto='BAC BO';
  function valor(){ return 'R$ '+(Math.random()*4800+200).toFixed(2).replace('.',','); }
  function boot(){
    if(typeof Notiflix==='undefined'){ return setTimeout(boot,500); }
    Notiflix.Notify.init({position:'center-top',cssAnimationStyle:'from-top',plainText:false,timeout:4000,distance:'12px',clickToClose:true});
    function show(){
      var n=nomes[Math.floor(Math.random()*nomes.length)]+' '+sobre[Math.floor(Math.random()*sobre.length)];
      Notiflix.Notify.success('<strong>'+n+'</strong> ganhou <strong>'+valor()+'</strong> no <strong>'+produto+'</strong>');
      setTimeout(show,(Math.floor(Math.random()*25)+8)*1000);
    }
    setTimeout(show,1500);
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded',boot); } else { boot(); }
})();
</script>
