<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StraPlay - Roleta Ao Vivo</title>
  <link rel="icon" href="/img/logo_straplay.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/games.css">
</head>
<body>

<div class="home-button" onclick="location.href='/'"><img src="/img/logo_straplay.png" alt="Home"></div>

<div class="logo-container"><img id="gameLogo" src="/img/roleta_ao_vivo.png" alt="Roleta Ao Vivo" class="logo"></div>

<div class="ultimosnumeros">Últimos Números</div>
<div id="results" class="results"></div>

<div id="loadingMessage" class="sinal-container">
  <h2 class="sinal-text loading-text loading-analisando" id="loadingText">🔎 BUSCANDO SINAIS...</h2>
</div>

<div id="sinalContainer" class="sinal-container">
  <div class="sinal-gerado">
    <h2 class="sinal-text" id="sinalgerado">- - -</h2>
  </div>
  <div class="sinal-gale-container">
    <div class="sinal-div">
      <h3 class="sinal-title">Sinal:</h3>
      <p id="sinalDados" class="sinal-data">- - -</p>
      <p id="protecaoDados" class="sinal-data">- - -</p>
    </div>
    <div class="gale-div">
      <h3 class="gale-title">Proteção:</h3>
      <p id="galeDados" class="gale-data"><strong>- - -</strong></p>
    </div>
  </div>
</div>

<div class="iframe-wrap">
  <iframe class="iframe" src="" id="iframe" title="VemnaBet" allow="payment *; clipboard-write" allowfullscreen></iframe>
</div>

<footer class="footer">Copyright © 2025 - <a href="/"><b>STRAPLAY</b></a></footer>

<script src="/js/game-core.js"></script>
<script>
(function () {
  var RED = ['1','3','5','7','9','12','14','16','18','19','21','23','25','27','30','32','34','36'];
  var BLACK = ['2','4','6','8','10','11','13','15','17','20','22','24','26','28','29','31','33','35'];

  var loadingText = document.getElementById('loadingText');
  var sinalGerado = document.getElementById('sinalgerado');
  var sinalDados  = document.getElementById('sinalDados');
  var protecao    = document.getElementById('protecaoDados');
  var gale        = document.getElementById('galeDados');
  var resultsDiv  = document.getElementById('results');

  var numeros = [];

  function cor(n) {
    n = String(n);
    if (n === '0') return 'green';
    if (RED.indexOf(n) !== -1) return 'red';
    if (BLACK.indexOf(n) !== -1) return 'black';
    return '';
  }
  function renderNumbers() {
    resultsDiv.innerHTML = '';
    numeros.slice(0, 5).forEach(function (n, i) {
      var box = document.createElement('div');
      box.className = 'result-box ' + cor(n) + (i === 0 ? ' new-result' : '');
      box.textContent = String(n);
      resultsDiv.appendChild(box);
    });
  }
  function push(n) {
    numeros.unshift(n);
    if (numeros.length > 5) numeros.length = 5;
    renderNumbers();
  }
  function status(txt, ok) {
    loadingText.textContent = txt;
    loadingText.classList.remove('loading-analisando', 'loading-validada');
    loadingText.classList.add(ok ? 'loading-validada' : 'loading-analisando');
  }
  function limpar() {
    sinalGerado.textContent = '- - -';
    sinalDados.textContent = '- - -';
    protecao.textContent = '- - -';
    gale.innerHTML = '<strong>- - -</strong>';
    status('🔎 BUSCANDO SINAIS...', false);
  }

  function gerarSinal() {
    var n = numeros[0] || '0';
    var estrategias = [
      { tipo: 'COLUNA',   msg: StraPlay.pick(['1ª e 2ª', '2ª e 3ª', '1ª e 3ª']) + ' após o ' + n },
      { tipo: 'DÚZIA',    msg: StraPlay.pick(['1ª e 2ª', '2ª e 3ª', '1ª e 3ª']) + ' após o ' + n },
      { tipo: 'COR',      msg: 'Apostar no ' + StraPlay.pick(['VERMELHO', 'PRETO']) },
      { tipo: 'PAR/ÍMPAR', msg: 'Apostar em ' + StraPlay.pick(['PAR', 'ÍMPAR']) },
      { tipo: 'METADE',   msg: StraPlay.pick(['1 a 18', '19 a 36']) }
    ];
    var e = StraPlay.pick(estrategias);

    sinalGerado.textContent = '✅ ENTRADA CONFIRMADA - ' + e.tipo;
    sinalDados.innerHTML = e.tipo + '<br>' + e.msg;
    protecao.innerHTML = '🎯 Proteja no ZERO';
    gale.innerHTML = '<strong>' + StraPlay.rand(2, 3) + '</strong>';
    status('✅ SINAL ENCONTRADO', true);
  }

  // Ciclo: gera N números iniciais, depois alterna
  function bootstrap() {
    for (var i = 0; i < 5; i++) push(StraPlay.rand(0, 36));
  }

  function tickNumero() {
    push(StraPlay.rand(0, 36));
  }

  function cicloSinal() {
    limpar();
    var delay = StraPlay.rand(8, 15) * 1000;
    setTimeout(function () {
      gerarSinal();
      setTimeout(cicloSinal, StraPlay.rand(120, 240) * 1000); // sinal dura 2-4min
    }, delay);
  }

  bootstrap();
  setInterval(tickNumero, StraPlay.rand(25, 40) * 1000);
  cicloSinal();
})();
</script>
</body>
</html>
