<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StraPlay - Slot</title>
  <link rel="icon" href="/img/logo_straplay.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/games.css">
</head>
<body>

<div class="home-button" onclick="location.href='/'">
  <img src="/img/logo_straplay.png" alt="Home">
</div>

<div class="logo-container">
  <img id="gameLogo" src="/img/logo_straplay.png" alt="Jogo" class="logo">
</div>

<div class="slot-box">
  <div class="slot-items">
    <div class="slot-item">
      <div class="slot-icon">🎰</div>
      <span>NORMAL:</span>
      <b id="normal">--</b>
    </div>
    <div class="slot-item">
      <div class="slot-icon">⚡</div>
      <span>TURBO:</span>
      <b id="turbo">--</b>
    </div>
    <div class="slot-item">
      <div class="slot-icon">🎯</div>
      <span>ACERTO DE:</span>
      <b id="level">--</b>
    </div>
    <div class="slot-item">
      <div class="slot-icon">⏱️</div>
      <span>VÁLIDO ATÉ:</span>
      <b id="validade">--</b>
    </div>
  </div>

  <div class="animated-text">
    <span>🚀 MULTIPLICADOR DE 3.500X ATIVADO ⭐ FUNCIONANDO APENAS NA PLATAFORMA ABAIXO 🔥 NOVA BRECHA DETECTADA 🤑 FAÇA SUA ENTRADA IMEDIATAMENTE</span>
  </div>

  <div class="container-botao">
    <button id="btn" class="botao-bonito">🚨 GERAR NOVO SINAL</button>
  </div>
</div>

<div class="iframe-wrap">
  <iframe class="iframe" src="" id="iframe" title="VemnaBet" allow="payment *; clipboard-write" allowfullscreen></iframe>
</div>

<footer class="footer">Copyright © 2025 - <a href="/"><b>STRAPLAY</b></a></footer>

<script src="/js/game-core.js"></script>
<script>
(function () {
  var btn = document.getElementById('btn');
  var outN = document.getElementById('normal');
  var outT = document.getElementById('turbo');
  var outV = document.getElementById('validade');
  var outL = document.getElementById('level');

  function countdown(seconds) {
    btn.disabled = true;
    var remain = seconds;
    btn.textContent = 'AGUARDE (' + remain + 's...)';
    var t = setInterval(function () {
      remain--;
      if (remain < 0) { clearInterval(t); btn.disabled = false; btn.textContent = '🚨 GERAR NOVO SINAL'; return; }
      btn.textContent = 'AGUARDE (' + remain + 's...)';
    }, 1000);
  }

  btn.addEventListener('click', function (e) {
    e.preventDefault();
    if (btn.disabled) return;
    outN.textContent = StraPlay.rand(5, 10) + 'X';
    outT.textContent = StraPlay.rand(5, 10) + 'X';
    outV.textContent = StraPlay.horarioMais(2);
    outL.textContent = StraPlay.randFloat(80.99, 99.99, 2) + '%';
    countdown(60);
  });
})();
</script>
</body>
</html>
